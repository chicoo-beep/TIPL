<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101412">
    <title>Tankaria Breakout</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="tankaria-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell" aria-label="Tankaria Breakout game">
      <header class="topbar">
        <div class="brand" aria-label="Tankaria">
          <div class="logo-mark" aria-hidden="true">
            <span class="turret"></span>
            <span class="tracks"></span>
          </div>
          <span>Tankaria</span>
        </div>
        <div class="stats" aria-live="polite">
          <span>Score <strong id="score">0</strong></span>
          <span>Lives <strong id="lives">3</strong></span>
        </div>
      </header>

      <section class="game-wrap">
        <canvas id="game" width="420" height="720" aria-label="Arkanoid style Tankaria game canvas"></canvas>
        <div class="overlay" id="overlay">
          <div class="hero-logo" aria-hidden="true">
            <div class="hero-tank">
              <span></span>
            </div>
            <strong>TANKARIA</strong>
          </div>
          <h1>Break the bunker line</h1>
          <p>Drag the command pad, bounce the shell, and clear every armored block.</p>
          <button id="startBtn" type="button">Start Mission</button>
        </div>
      </section>

      <nav class="controls" aria-label="Game controls">
        <button id="leftBtn" type="button" aria-label="Move left">‹</button>
        <button id="pauseBtn" type="button" aria-label="Pause game">II</button>
        <button id="rightBtn" type="button" aria-label="Move right">›</button>
      </nav>
    </main>

    <script src="game.js"></script>
  </body>
</html>
